app = "jirabot-agent"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  dockerfile_path = "packages/agent/Dockerfile"

[env]
  PORT = "3001"
  NODE_ENV = "production"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
