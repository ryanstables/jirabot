services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  agent:
    build:
      context: .
      dockerfile: packages/agent/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
